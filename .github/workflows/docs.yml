name: docs
on:
  push:
    branches:
      - master
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3.4.0
      - name: Install Node.js
        uses: actions/setup-node@v3.6.0
        with:
          cache: npm
          cache-dependency-path: interpreter_node/package-lock.json
          node-version: "18.15.0"
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Install
        run: npm --prefix interpreter_node ci
      - name: Build WASM module
        run: wasm-pack build --out-dir ../../interpreter_node/src/wasm/module --out-name index --target web interpreter_rust/interpreter
      - name: Build WASM LSP module
        run: wasm-pack build --out-dir ../../interpreter_node/src/wasm/lsp_module --out-name index --target web interpreter_rust/lsp_browser
      - name: Build docs
        run: npm --prefix interpreter_node run build
      - name: Deploy docs
        uses: peaceiris/actions-gh-pages@v3.9.2
        with:
          allow_empty_commit: true
          force_orphan: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./interpreter_node/lib/ui
